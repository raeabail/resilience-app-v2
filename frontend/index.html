<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Resilience Scoring Dashboard</title>

  <!-- Bootstrap + Icons + Leaflet (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>

<body> 

<nav class="navbar center">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-2">
      <span class="navbar-title">
        <a href="https://sentinellandscapes.org" target="_blank" rel="noopener noreferrer">
          <img src="assets/SL_logo.png" alt="SL Logo" height="45px" class="logo-group">
        </a>  
      Resilience Scoring Dashboard</span>
    </div>
  </div>
</nav>

  <div class="container-fluid py-3">
  <div class="row g-3">

    <!-- ===== LEFT: Workflow + Legend ===== -->
    <div class="col-12 col-lg-3">
      <!-- Workflow -->
      <div class="card shadow-sm mb-3 h-100">
        <div class="card-body p-0">
          <div class="accordion accordion-flush" id="stepsAcc">
            <!-- Step 1: Choose a Hazard -->
            <div class="card shadow-sm mb-3">
              <div class="card-header py-2">
                <span class="fw-semibold">Step 1: Choose a Hazard</span>
              </div>
              <div class="card-body">
                <div class="btn-group flex-wrap gap-2 hazard-group" id="hazardGroup" role="group"></div>
              </div>
            </div>
            <!-- Step 2: Boundary -->
            <div class="accordion-item">
              <h2 class="accordion-header" id="s2h">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#s2" aria-expanded="false" aria-controls="s2">
                  Step 2: Boundary Layer
                </button>
              </h2>
              <div id="s2" class="accordion-collapse collapse" aria-labelledby="s2h" data-bs-parent="#stepsAcc">
                <div class="accordion-body">
                  <label class="form-label">Upload Boundary Layer (shapefile .zip or GeoJSON)</label>
                  <input id="boundaryFile" type="file" accept=".zip,.geojson,.json" class="form-control form-control-sm">
                  <div class="form-text">Used to clip and table outputs.</div>
                </div>
              </div>
            </div>

           <!-- Step 3: Data Inputs -->
            <div class="accordion-item">
              <h2 class="accordion-header" id="s3h">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#s3" aria-expanded="false" aria-controls="s3">
                  Step 3: Data Inputs
                </button>
              </h2>
              <div id="s3" class="accordion-collapse collapse" aria-labelledby="s3h" data-bs-parent="#stepsAcc">
                <div class="accordion-body" id="dataInputs"></div>
              </div>
            </div>

            <!-- Step 4: Analyses -->
            <div class="accordion-item">
              <h2 class="accordion-header" id="s4h">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#s4" aria-expanded="false" aria-controls="s4">
                  Step 4: Analyses
                </button>
              </h2>
              <div id="s4" class="accordion-collapse collapse" aria-labelledby="s4h" data-bs-parent="#stepsAcc">
                <div class="accordion-body" id="analysesBox"></div>
              </div>
            </div>

            <!-- Step 5: Metric Weights -->
            <div class="accordion-item">
              <h2 class="accordion-header" id="s5h">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#s5" aria-expanded="false" aria-controls="s5">
                  Step 5: Metric Weights
                </button>
              </h2>
              <div id="s5" class="accordion-collapse collapse" aria-labelledby="s5h" data-bs-parent="#stepsAcc">
                <div class="accordion-body" id="weightsBox"></div>
              </div>
            </div>

            <!-- Step 6: Review -->
            <div class="accordion-item">
              <h2 class="accordion-header" id="s6h">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#s6" aria-expanded="false" aria-controls="s6">
                  Step 6: Review
                </button>
              </h2>
              <div id="s6" class="accordion-collapse collapse" aria-labelledby="s6h" data-bs-parent="#stepsAcc">
                <div class="accordion-body">
                  <div id="reviewBox" class="small"></div>
                </div>
              </div>
            </div>
            </div>
        </div>

            <div class="card-footer bg-white">
              <button id="btnRun" class="btn btn-primary w-100">
                <i class="bi bi-play-fill"></i> Run
              </button>
              <div id="runMsg" class="form-text mt-2"></div>
            </div>
      </div>

 <!-- Legend (hidden until results) -->
      <div id="legendCard" class="card shadow-sm d-none">
        <div class="card-header py-2"><span class="fw-semibold">Legend</span></div>
        <div class="card-body" id="legend"></div>
      </div>
    </div> <!-- ← END LEFT COLUMN -->

    <!-- ===== RIGHT: Map + (hidden) Table ===== -->
    <div class="col-12 col-lg-9">
      <div class="card shadow-sm mb-3 stretch-card">
        <div class="card-header py-2">
        </div>
        <div class="card-body p-0">
          <div id="map" class="map"></div>
        </div>
      </div>

      <!-- Attribute table (hidden until data) -->
      <div id="tableCard" class="card shadow-sm d-none">
        <div class="card-header py-2"><span class="fw-semibold">Attribute Table</span></div>
        <div class="card-body p-0">
          <div class="table-responsive" style="max-height:260px;">
            <table class="table table-sm table-hover mb-0">
              <thead id="tblHead"></thead>
              <tbody id="tblBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div> <!-- ← END RIGHT COLUMN -->

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-providers@1.13.0/leaflet-providers.js"></script>
<script>
  window.API_BASE = "https://miniature-meme-p575xppg799h7757-8080.app.github.dev";
</script>
<script src="app.js"></script>

</body>
</html>
